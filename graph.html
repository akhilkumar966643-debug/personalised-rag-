<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lumina | Knowledge Graph</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .graph-container {
            position: relative;
            width: 100%;
            height: 60vh;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .node {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 2;
        }

        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .node-mastered {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        .node-current {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .node-locked {
            background: linear-gradient(135deg, #475569, #64748b);
            opacity: 0.7;
        }

        .line {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            height: 2px;
            z-index: 1;
            transform-origin: 0 50%;
        }

        .line-active {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            height: 3px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar glass-panel">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-brain"></i></div> Lumina
        </div>
            <ul class="nav-links">
      <li><a href="index.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
      <li><a href="subjects.html" class="nav-link"><i class="fa-solid fa-book"></i> Subjects</a></li>
      <li><a href="curriculum.html" class="nav-link"><i class="fa-solid fa-map"></i> Curriculum</a></li>
      <li><a href="tutor.html" class="nav-link"><i class="fa-solid fa-robot"></i> AI Tutor</a></li>
      <li><a href="jam.html" class="nav-link"><i class="fa-solid fa-users"></i> Group Jam</a></li>
      <li><a href="quiz.html" class="nav-link"><i class="fa-solid fa-list-check"></i> Practice Quiz</a></li>
      <li><a href="graph.html" class="nav-link active"><i class="fa-solid fa-project-diagram"></i> Knowledge Graph</a></li>
      <li><a href="profile.html" class="nav-link"><i class="fa-solid fa-database"></i> Data Hub</a></li>
    </ul>
    </nav>

    <main class="main-content">
        <header class="animate-fade-in">
            <div>
                <h1>Your Concept Map</h1>
                <p class="subtitle">Visual representation of your Physics knowledge state.</p>
            </div>
            <button class="btn btn-outline"><i class="fa-solid fa-arrows-rotate"></i> Sync RAG State</button>
        </header>

        <div class="graph-container animate-fade-in" style="animation-delay: 0.1s;">

            <!-- Nodes -->
            <div class="node node-mastered" style="top: 20%; left: 15%;">
                <i class="fa-solid fa-apple-whole" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
                Classical<br>Mechanics
            </div>

            <div class="node node-mastered" style="top: 25%; left: 40%;">
                <i class="fa-solid fa-water" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
                Waves &<br>Optics
            </div>

            <div class="node node-current" style="top: 60%; left: 45%;">
                <i class="fa-solid fa-atom" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
                Quantum<br>Foundations
            </div>

            <div class="node node-locked" style="top: 50%; left: 75%;">
                <i class="fa-solid fa-dice" style="font-size: 1.5rem; margin-bottom: 5px;"></i>
                Statistical<br>Mechanics
            </div>

            <!-- Static Lines Mockup (Using fixed rotation/width for demo) -->
            <div class="line line-active" style="top: 35%; left: 24%; width: 20%; transform: rotate(10deg);"></div>
            <div class="line line-active" style="top: 40%; left: 45%; width: 20%; transform: rotate(70deg);"></div>
            <div class="line" style="top: 65%; left: 55%; width: 22%; transform: rotate(-15deg);"></div>

        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
